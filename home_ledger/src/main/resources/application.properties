# =======================
# kakao - rest_api_key
# =======================
kakao.rest.api.key=kakaoApiKey
kakao.login.secret.key=kakaoSecretKey

# =======================
# naver - Client
# =======================
naver.client.id=naverClientId
naver.client.secret=naverClientSecret
